<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warranty Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: #0E1B26; color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 40px 20px;
}
.wrap { max-width: 620px; text-align: center; }
h1 { font-size: 2.2rem; margin-bottom: 0.4em; color: #2E86AB; }
p { line-height: 1.6; color: #d8d8d8; }
.badge { display: inline-block; padding: 6px 14px; border: 1px solid #2E86AB; border-radius: 20px; color: #2E86AB; font-size: 0.85rem; margin-bottom: 20px; }
a { color: #2E86AB; }
.foot { margin-top: 40px; font-size: 0.8rem; color: #888; }
h2 { color: #2E86AB; margin-top: 2em; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #2E86AB55 0%, #2E86AB00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <div class="badge">iOS App</div>
  <h1>Warranty Box</h1>
  <p>Log every appliance and gadget purchase with receipt photo and warranty expiry so you never miss a claim window.</p>
  <p><strong>Pro:</strong> Unlimited items, expiry push reminders, and PDF export of warranty list</p>
  <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
  <div class="foot">Contact: s0533495227@gmail.com</div>
</div>
</body>
</html>
