name: WarrantyBox
options:
  bundleIdPrefix: com.shimondeitel.warrantybox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  WarrantyBox:
    type: application
    platform: iOS
    sources:
      - path: WarrantyBox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warrantybox
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WarrantyBox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WarrantyBoxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WarrantyBoxTests
      - path: WarrantyBox.storekit
    dependencies:
      - target: WarrantyBox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warrantybox.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WarrantyBoxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WarrantyBoxUITests
    dependencies:
      - target: WarrantyBox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warrantybox.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  WarrantyBox:
    build:
      targets:
        WarrantyBox: all
        WarrantyBoxTests: [test]
        WarrantyBoxUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: WarrantyBox.storekit
    test:
      config: Debug
      storeKitConfiguration: WarrantyBox.storekit
      targets:
        - WarrantyBoxTests
        - WarrantyBoxUITests
    archive:
      config: Release
